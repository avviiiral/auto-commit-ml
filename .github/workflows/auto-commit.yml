name: Daily Auto Commit Bot

on:
  schedule:
    - cron: "20 6 * * *"
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Verify GH_PAT exists
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "❌ GH_PAT secret is empty"
            exit 1
          else
            echo "✅ GH_PAT secret found"
            echo "Token length: ${#GH_PAT}"
          fi

      - name: Verify GitHub User
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "Checking authenticated GitHub user..."
          curl -s \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user

      - name: Verify Repository Access
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "Checking repository access..."
          curl -s \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/avviiiral/visioncount-multi-model

      - name: Run Auto Commit Script
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python scripts/auto_commit.py
