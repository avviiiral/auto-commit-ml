name: Daily ML Auto Commit

on:
  schedule:
    - cron: '30 2 * * *'    # 02:30 UTC (08:00 IST)
    - cron: '30 14 * * *'   # 14:30 UTC (20:00 IST)
  workflow_dispatch:

jobs:
  commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run ML script
        run: |
          python ml_log.py

      - name: Commit changes
        run: |
          git config --global user.name "avviiiral"
          git config --global user.email "aviralgoyal739@gmail.com"

          messages=(
            "Log ML training metrics"
            "Update experiment results"
            "Track model performance"
            "Add training run statistics"
            "Update ML evaluation metrics"
          )

          RANDOM_MSG=${messages[$RANDOM % ${#messages[@]}]}

          git add .
          git commit -m "$RANDOM_MSG" || echo "No changes to commit"
          git push origin main
